# Reload
unbind r
bind r source-file ~/.tmux.conf

set -g mouse on
bind m set -g mouse on \; display "Mouse ON"
bind M set -g mouse off \; display "Mouse OFF"

set-option -g allow-rename off  # Keep tab names fixed
set -g history-limit 8192
# Start numbering at 1
set -g base-index 1

bind -n C-k clear-history
bind-key k clear-history

# Allows for faster key repetition
set -s escape-time 0

# Set status bar
set -g status-style bg=black,fg=white
set -g status-left ""

# Rather than constraining window size to the maximum size of any client
# connected to the *session*, constrain window size to the maximum size of any
# client connected to *that window*. Much more reasonable.
#setw -g aggressive-resize on
setw -g aggressive-resize off

# Allows us to use C-a a <command> to send commands to a TMUX session inside
# another TMUX session
#bind-key a send-prefix

# Activity monitoring
#setw -g monitor-activity on
#set -g visual-activity on

# Example of using a shell command in the status line
#set -g status-right "#[fg=yellow]#(uptime | cut -d ',' -f 2-)"

# Highlight active window
set-window-option -g window-status-current-style bg=red

#set -g status-right "CPU: #{cpu_percentage} | Battery: #{battery_icon} #{battery_percentage} #{battery_remain} | #{online_status} | %a %h-%d %H:%M "
set -g status-right "Battery: #{battery_icon} #{battery_percentage} #{battery_remain} | %a %h-%d %H:%M "

setw -g mode-keys vi
set -g @shell_mode 'vi'

# Move tabs left right
bind-key -n C-S-Left swap-window -t -1
bind-key -n C-S-Right swap-window -t +1

# Switch windows
bind -n S-Left  select-window -t :-
bind -n S-Right select-window -t :+
bind -n S-Up select-pane -t .- \;  resize-pane -Z
bind -n S-Down select-pane -t .+1 \;  resize-pane -Z

# Full screen pane switch
bind -n C-p select-pane -t .- \;  resize-pane -Z
bind -n C-n select-pane -t .+1 \;  resize-pane -Z


# List of plugins  # Install, Update: Prefix-I, Prefix-U
set -g @plugin 'tmux-plugins/tpm'
#set -g @plugin 'tmux-plugins/tmux-sensible'

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Automatic Restore: Last saved environment is automatically restored when tmux is started.
set -g @continuum-restore 'on'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run -b '~/.tmux/plugins/tpm/tpm'

# Vim plugin manager
[".vim/bundle/vundle"]
    type = "git-repo"
    url = "https://github.com/gmarik/Vundle.vim.git"
    refreshPeriod = "168h"
    clone.args = ["--depth", "1"]
    pull.args = ["--ff-only"]

# Tmux plugin manager
[".tmux/plugins/tpm"]
    type = "git-repo"
    url = "https://github.com/tmux-plugins/tpm.git"
    refreshPeriod = "168h"
    clone.args = ["--depth", "1"]
    pull.args = ["--ff-only"]
